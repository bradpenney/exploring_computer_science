site_name: "Exploring Computer Science"
site_url: https://cs.bradpenney.io
site_description: The CS theory behind the production code you write.
site_author: Brad Penney
extra:
  analytics:
    provider: google
    property: G-V01MJ4R3SQ
extra_css:
  - stylesheets/extra.css
theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: amber
  logo: images/exploring_computer_science.png
  favicon: images/exploring_computer_science.png
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  features:
    - content.code.annotate
    - content.code.copy
    - content.code.highlight
    - content.tooltips
    - content.code.mermaid

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bradpenney
    - icon: fontawesome/solid/globe
      link: https://bradpenney.io

plugins:
  - search
  - meta
  - exclude:
      glob:
        # Essentials drafts
        - "essentials/stacks_and_queues.md"
        - "essentials/linked_lists.md"
        - "essentials/queues_and_deques.md"
        - "essentials/searching_linear_vs_binary.md"
        - "essentials/sorting_elementary.md"
        - "essentials/big_o_time_complexity.md"
        # Efficiency drafts
        - "efficiency/big_o_space_complexity.md"
        - "efficiency/binary_search_trees.md"
        - "efficiency/database_fundamentals.md"
        - "efficiency/graph_traversal.md"
        - "efficiency/information_security_basics.md"
        - "efficiency/oop/**"
        - "efficiency/programming_paradigms.md"
        - "efficiency/sorting_insertion.md"
        - "efficiency/sorting_merge.md"
        - "efficiency/sorting_quick.md"
        - "efficiency/systems/**"
        # Mastery (returning to draft for essentials/efficiency-only release)
        - "mastery/**"
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1a202c"
        color: "#cbd5e0"
  - htmlproofer:
      enabled: true
      validate_rendered_template: true
      validate_external_urls: false
      raise_error: true
      raise_error_after_finish: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js
  - javascripts/charts.js

